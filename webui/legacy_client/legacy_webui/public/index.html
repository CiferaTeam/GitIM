<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitIM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <h1>GitIM</h1>
      </div>
      <div class="header-center">
        <span id="channel-title">#general</span>
      </div>
      <div class="header-right">
        <span id="connection-status" class="status-dot disconnected" title="连接状态"></span>
        <span id="current-user">未登录</span>
      </div>
    </header>

    <div id="main">
      <aside id="sidebar">
        <div class="sidebar-section">
          <h3>频道</h3>
          <ul id="channel-list"></ul>
        </div>
        <div class="sidebar-section">
          <h3>用户</h3>
          <ul id="user-list"></ul>
        </div>
      </aside>

      <div id="content">
        <div id="messages"></div>
        <div id="input-area">
          <div id="reply-indicator" class="hidden">
            <span id="reply-text"></span>
            <button id="reply-cancel" title="取消回复">&times;</button>
          </div>
          <div id="input-row">
            <textarea id="msg-input" placeholder="输入消息… 按 Enter 发送" rows="1"></textarea>
            <button id="send-btn">发送</button>
          </div>
          <!-- @提及下拉 -->
          <div id="mention-popup" class="hidden"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 线程面板 -->
  <div id="thread-panel" class="hidden">
    <div class="thread-header">
      <span id="thread-title">引用链</span>
      <button id="thread-close">&times;</button>
    </div>
    <div id="thread-messages"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
